# Build an MCUboot-signed application (image 0).
CONFIG_BOOTLOADER_MCUBOOT=y

# Two updateable images: app (0) + Wi-Fi patch (1). Must match
# SB_CONFIG_MCUBOOT_UPDATEABLE_IMAGES in sysbuild.conf.
CONFIG_UPDATEABLE_IMAGE_NUMBER=2

# Flash access + MCUboot image management (read headers, confirm image 1).
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_REBOOT=y

# MCUmgr / SMP over UART so a new patch image can be uploaded without a debugger.
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_BASE64=y
CONFIG_MCUMGR=y
CONFIG_UART_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y

# img_mgmt must expose image 1 (slots 2/3). 2 images needs a >=512B net buf.
CONFIG_MCUMGR_GRP_IMG_UPDATABLE_IMAGE_NUMBER=2
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=512

# Command handlers need a larger stack.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2304
CONFIG_MAIN_STACK_SIZE=2176

# Console + logging.
CONFIG_CONSOLE=y
CONFIG_LOG=y
CONFIG_MCUBOOT_UTIL_LOG_LEVEL_WRN=y
CONFIG_LOG_MAX_LEVEL=3
