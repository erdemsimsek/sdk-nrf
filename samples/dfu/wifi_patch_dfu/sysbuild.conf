# MCUboot as the single-stage bootloader (NOT two-stage NSIB+MCUboot): this is
# what makes MCUboot map slot2/slot3 to image 1.
SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_SECURE_BOOT_APPCORE=n

# Two updateable images: image 0 (app) + image 1 (Wi-Fi patch). This forwards
# CONFIG_UPDATEABLE_IMAGE_NUMBER=2 to both MCUboot and the application.
SB_CONFIG_MCUBOOT_UPDATEABLE_IMAGES=2

# The Wi-Fi patch is registered as one extra (non-Zephyr) signed image.
SB_CONFIG_MCUBOOT_EXTRA_IMAGES=1

# Produce DFU artifacts that include image 1.
SB_CONFIG_DFU_MULTI_IMAGE_PACKAGE_BUILD=y
SB_CONFIG_DFU_MULTI_IMAGE_PACKAGE_APP=y
SB_CONFIG_DFU_ZIP=y
